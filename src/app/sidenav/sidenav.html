<div [ngClass]="collapsed() ? 'sidenav-collapsed': ''"
class="sidenav bg-gray-800 transition-500 transition-all ease-in-out fixed z-1 top-0 h-[100vh] shadow-emerald-200">
  <div class="logo-container flex items-center p-[0.938rem] w-full h-[70px]">
    <img class="logo w-[3rem] p-[0.313rem] rounded-md cursor-pointer"
    src="assets/images/logoifc.png" alt="logo" width="60%" (click)="toggleCollapse()"/>
    @if(collapsed()){<div class="logo-text ml-[1.5rem] text-xl text-white">Impact Football Club</div>
    <span class="btn-close ml-auto cursor-pointer w-[2rem] rounded-full bg-transparent text-white items-center"
    (click)="closeSidenav()">
      <i class="fa-solid fa-xmark"></i>
    </span>}
  </div>
  <ul class="sidenav-nav list-none p-[0.938rem] flex flex-col items-center cursor-pointer">
    @for(data of navData(); track data.label){
    <li class="sidenav-nav-item w-[70%] ml-[0.625rem] mb-[0.625rem] text-white
    hover:bg-gray-200 hover:text-black rounded-[0.625rem]">
      <a
      class="sidenav-nav-link flex items-center h-[3rem] text-white-700 no-underline
      transition-all delay-150 duration-300 ease-in-out"
      [routerLink]="data.routeLink">
        <span class=" sidenav-link-icon w-[2.5rem] text-2xl mx-[0.5rem] text-center">
          <i class="{{data.icon}}"></i>
        </span>
        @if(collapsed()){
          <span class="sidenav-link-text ml-[1.5rem]">
            {{data.label}}
          </span>
        }
      </a>
    </li>

  }
  </ul>

</div>
