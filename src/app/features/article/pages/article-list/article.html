@if (articlesService.loading()) {

<p>Chargement...</p>

}
@else {

<div
class="grid
grid-cols-3
gap-8">

@for(article of articlesService.articles(); track article.id){

    <app-article-card
        [article]="article"
        [editable]="true"
        (edit)="onEdit($event)"
        (remove)="onDelete($event)">
    </app-article-card>

}

</div>

}
